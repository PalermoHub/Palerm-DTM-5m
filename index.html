<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palermo DTM 5m — MapLibre 3D</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css"
        integrity="sha384-Nq6PQ+9vJPvw7U/VfDELyrWoGQMsy0gi6QShhaSrGzkpF5KkM40csg2leky+YMTd"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="css/map.css" />
</head>
<body>

<div id="map"></div>

<div id="controls">
  <h2>🗻 Palermo DTM 5m</h2>

  <div class="section-label">Cartografia di base</div>
  <div class="radio-group">
    <label class="radio-row">
      <input type="radio" name="basemap" value="osm" checked /> OpenStreetMap
    </label>
    <label class="radio-row">
      <input type="radio" name="basemap" value="satellite" /> Google Satellite
    </label>
    <label class="radio-row">
      <input type="radio" name="basemap" value="esri" /> Esri WorldImagery
    </label>
  </div>

  <div class="section-label">Overlay cartografico</div>

  <div class="toggle-row">
    <label for="toggle-ctr"><span class="icon">🗺️</span> Carta tecnica 2K</label>
    <label class="switch">
      <input type="checkbox" id="toggle-ctr" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="slider-row" id="ctr-opacity-row" style="display:none;">
    <label>
      <span>Opacità CTR</span>
      <span id="ctr-opacity-val">0.7</span>
    </label>
    <input type="range" id="ctr-opacity-slider" min="0.1" max="1" step="0.05" value="0.7" />
  </div>

  <div class="section-label">Terreno & rilievo</div>

  <div class="toggle-row">
    <label for="toggle-terrain"><span class="icon">🏔️</span> Modello 3D terreno</label>
    <label class="switch">
      <input type="checkbox" id="toggle-terrain" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="slider-row" id="exaggeration-row">
    <label>
      <span>Esagerazione verticale</span>
      <span id="exag-val">1.5×</span>
    </label>
    <input type="range" id="exag-slider" min="1" max="5" step="0.1" value="1.5" />
  </div>

  <div class="toggle-row">
    <label for="toggle-shadow"><span class="icon">🌤️</span> Ombreggiatura rilievo</label>
    <label class="switch">
      <input type="checkbox" id="toggle-shadow" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div id="shadow-controls">
    <div class="slider-row">
      <label>
        <span>Intensità ombra</span>
        <span id="shadow-intensity-val">0.6</span>
      </label>
      <input type="range" id="shadow-intensity-slider" min="0" max="1" step="0.05" value="0.6" />
    </div>

    <div class="slider-row">
      <label>
        <span>☀️ Ora solare</span>
        <span id="shadow-time-val">12:00</span>
      </label>
      <input type="range" id="shadow-time-slider" min="360" max="1080" step="5" value="720" />
    </div>
    <button id="btn-now" class="btn-small">⏱ Ora locale</button>
  </div>

  <div class="section-label">Curve di livello</div>

  <div class="toggle-row">
    <label for="toggle-contour"><span class="icon">📏</span> Mostra curve</label>
    <label class="switch">
      <input type="checkbox" id="toggle-contour" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="legend" id="legend-contour">
    <div class="legend-item">
      <div class="legend-line" style="background:#f59e0b; height:2px;"></div>
      <span>Curve principali (50m)</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#fcd34d; height:1px;"></div>
      <span>Curve secondarie (10m) — zoom ≥13</span>
    </div>
  </div>
</div>

<div id="info">
  DTM 5m · Palermo · <a href="https://github.com/coseerobe/palermo_dtm_5m" target="_blank" rel="noopener noreferrer">GitHub</a>
</div>

<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"
        integrity="sha384-GfxBM9x46BaAFxtCq39Fxir8fNZ4VDnwgfi6Kzi5/F1tAFsm0amuuV8kd+Pxzuf/"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"
        integrity="sha384-QfbOCebHNw8pQiPAOd2IFee2v2A5VYZxBk0+JGZ5H+3mfzVIp6zsQNkTsfGJot93"
        crossorigin="anonymous"></script>
<script src="js/map.js"></script>
</body>
</html>
